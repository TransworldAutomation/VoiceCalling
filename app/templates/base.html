<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI Voice Interview Agent{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #181b22; --panel-2: #1f242e; --line: #2a2f3a;
      --text: #e7ebf0; --muted: #98a2b3; --accent: #6ea8fe; --accent-2:#7ee2b8;
      --danger:#ff8a8a; --warn:#ffcf6e;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f5f7fb; --panel:#ffffff; --panel-2:#f0f3f9; --line:#e2e7f0;
        --text:#1a2230; --muted:#5b6472; --accent:#2f6fed; --accent-2:#12a67a;
        --danger:#d64545; --warn:#b7791f;
      }
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
      font: 15px/1.55 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { border-bottom:1px solid var(--line); background:var(--panel);
      padding: 16px 24px; display:flex; align-items:center; gap:12px; }
    header .logo { font-size: 20px; font-weight: 700; }
    header .tag { color:var(--muted); font-size:13px; }
    main { max-width: 1080px; margin: 0 auto; padding: 24px; }
    .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; margin-bottom:24px; }
    .stat { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }
    .stat .n { font-size:28px; font-weight:700; }
    .stat .l { color:var(--muted); font-size:13px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px;
      padding:18px 20px; margin-bottom:20px; }
    h2 { font-size:16px; margin:0 0 14px; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
    tr:last-child td { border-bottom:none; }
    .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600; }
    .badge.completed { background:rgba(126,226,184,.15); color:var(--accent-2); }
    .badge.failed { background:rgba(255,138,138,.15); color:var(--danger); }
    .badge.in_progress, .badge.pending { background:rgba(255,207,110,.15); color:var(--warn); }
    .btn { display:inline-block; background:var(--accent); color:#fff; padding:8px 14px;
      border-radius:8px; border:none; font-size:14px; cursor:pointer; }
    .btn.secondary { background:var(--panel-2); color:var(--text); border:1px solid var(--line); }
    .muted { color:var(--muted); }
    .bubble { padding:10px 14px; border-radius:12px; margin:8px 0; max-width:80%; white-space:pre-wrap; }
    .bubble.agent { background:var(--panel-2); border:1px solid var(--line); }
    .bubble.user { background:rgba(110,168,254,.12); margin-left:auto; }
    .who { font-size:12px; color:var(--muted); margin-bottom:2px; }
    .summary { background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
      padding:16px; white-space:pre-wrap; }
    input[type=file] { color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <span class="logo">📞 AI Voice Interview Agent</span>
    <span class="tag">calls people · asks in regional language · summarizes for you</span>
    <span style="margin-left:auto"><a href="/">Dashboard</a></span>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
